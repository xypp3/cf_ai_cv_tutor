<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CV Tailor</title>
    <style>
      body {
        font-family: sans-serif;
        min-width: 240px;
        padding: 12px;
      }
      #header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      #open-options {
        border: 1px solid #ccc;
        background: #f8f8f8;
        padding: 4px 8px;
        font-size: 12px;
        cursor: pointer;
      }
      button {
        padding: 8px 12px;
        width: 100%;
      }
      #status {
        margin-top: 8px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="header">
      <h3 style="margin: 0;">CV Tailor</h3>
      <button id="open-options" title="Open options">Add CV</button>
    </div>
    <div id="cv-status">Checking CV…</div>
    <button id="analyze">Analyze this job</button>
    <div id="status">Waiting…</div>
    <div id="result"></div>
    <script src="popup.js"></script>
  </body>
</html>
